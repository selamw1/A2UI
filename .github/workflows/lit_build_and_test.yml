name: Lit renderer

on:
  push:
    branches: [main]
    paths:
      - "renderers/lit/**"
      - "renderers/web_core/**"
      - ".github/workflows/lit_build_and_test.yml"
  pull_request:
    paths:
      - "renderers/lit/**"
      - "renderers/web_core/**"
      - ".github/workflows/lit_build_and_test.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [unit, integration]
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Unit Tests
        if: matrix.task == 'unit'
        run: yarn workspace @a2ui/lit test:unit

      - name: Run Integration Tests
        if: matrix.task == 'integration'
        run: yarn workspace @a2ui/lit test:integration
