name: Lit renderer

on:
  push:
    branches: [main]
    paths:
      - "renderers/lit/**"
      - "renderers/web_core/**"
      - ".github/workflows/lit_build_and_test.yml"
  pull_request:
    paths:
      - "renderers/lit/**"
      - "renderers/web_core/**"
      - ".github/workflows/lit_build_and_test.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [unit, integration]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Unit tests need to build the Lit renderer
      - name: Build web_core
        if: matrix.task == 'unit'
        working-directory: ./renderers/web_core
        run: npm i && npm run build
      - name: Build Lit renderer
        if: matrix.task == 'unit'
        working-directory: ./renderers/lit
        run: npm i && npm run build
      - name: Run unit tests
        if: matrix.task == 'unit'
        working-directory: ./renderers/lit
        run: npm run test:unit

      # Integration tests take care of build:deps in the app under test
      - name: Install Lit deps
        if: matrix.task == 'integration'
        working-directory: ./renderers/lit
        run: npm i
      - name: Run integration tests
        if: matrix.task == 'integration'
        working-directory: ./renderers/lit
        run: npm run test:integration
