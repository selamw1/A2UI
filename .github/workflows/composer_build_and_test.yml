name: Composer

on:
  push:
    paths:
      - "tools/composer/**"
      - "renderers/react/**"
      - "renderers/web_core/**"
      - ".github/workflows/composer_build_and_test.yml"
  pull_request:
    paths:
      - "tools/composer/**"
      - "renderers/react/**"
      - "renderers/web_core/**"
      - ".github/workflows/composer_build_and_test.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web_core (dependency of @a2ui/react)
        run: yarn workspace @a2ui/web_core build

      - name: Build React renderer (local file dependency)
        run: yarn workspace @a2ui/react build

      - name: Lint
        working-directory: ./tools/composer
        run: yarn lint

      - name: Build
        working-directory: ./tools/composer
        run: yarn build

      - name: Test
        working-directory: ./tools/composer
        run: yarn test
